<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Herro Oyunu</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; padding: 0;
            background: linear-gradient(135deg, #0a5f2a, #0a3a1a);
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #eee;
            min-height: 100dvh;
            user-select: none; -webkit-user-select: none;
        }
        input { user-select: text !important; -webkit-user-select: text !important; touch-action: manipulation; }
        button { touch-action: manipulation; cursor: pointer; }

        /* ── İSİM SEÇİM ── */
        #name-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100dvh; padding: 24px 16px;
        }
        .ns-title { font-size: clamp(26px,8vw,42px); font-weight: 900; color: #ffd966; margin-bottom: 6px; letter-spacing: 3px; text-shadow: 0 2px 12px #0008; }
        .ns-sub { font-size: clamp(13px,3.5vw,17px); color: #b8c8b0; margin-bottom: 28px; }
        .ns-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; width: 100%; max-width: 380px; margin-bottom: 28px; }
        .ns-btn {
            background: rgba(0,0,0,0.45); border: 2px solid #ffd96660; border-radius: 16px;
            padding: 16px 6px; font-size: clamp(14px,4.5vw,19px); font-weight: 800; color: #ffd966;
            cursor: pointer; transition: all 0.15s;
        }
        .ns-btn:active { transform: scale(0.92); }
        .ns-btn.selected { background: #d4af37; border-color: #ffe599; color: #1a2a1a; box-shadow: 0 0 0 3px #ffd96680; transform: scale(1.06); }
        .ns-start {
            background: #1a5a2a; border: 2px solid #2a8a3a80; border-radius: 50px;
            padding: 14px 52px; font-size: clamp(15px,4.5vw,20px); font-weight: 900;
            color: #5a8a6a; pointer-events: none; transition: all 0.25s;
        }
        .ns-start.ready { background: #2a8a3a; border-color: #4aaa5a; color: #d4f0d0; pointer-events: auto; cursor: pointer; box-shadow: 0 4px 18px #0a5f2a88; }
        .ns-start.ready:active { transform: scale(0.96); filter: brightness(0.85); }

        /* ── OYUN EKRANI ── */
        #game-screen { display: none; }
        .game-container { max-width: 700px; margin: 0 auto; background: rgba(0,0,0,0.4); border-radius: 20px; padding: 10px; min-height: 100dvh; }
        .top-bar { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 6px; margin-bottom: 8px; }
        .game-title { font-size: clamp(16px,5vw,22px); font-weight: 900; color: #ffd966; }
        .top-badges { display: flex; gap: 6px; flex-wrap: wrap; }
        .badge { background: rgba(0,0,0,0.5); border: 1px solid #ffd96660; border-radius: 20px; padding: 3px 10px; font-size: clamp(10px,3vw,13px); color: #ffd966; font-weight: bold; white-space: nowrap; }

        /* ── SKOR ── */
        .score-table { background: #1e2a1f; border-radius: 14px; padding: 5px; margin-bottom: 8px; }
        .score-row { display: flex; background: #2a3a2a; margin: 2px 0; border-radius: 8px; overflow: hidden; }
        .score-row.hdr { background: #1e3a1e; }
        .score-row.act { background: #2a4a2a; border: 1px solid #ffd96640; }
        .sc { flex:1; padding: clamp(3px,1.5vw,6px) clamp(2px,1vw,4px); text-align: center; font-weight: bold; font-size: clamp(10px,2.8vw,13px); border-right: 1px solid #4a6a3a40; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .sc:last-child { border-right: none; }
        .score-row.hdr .sc { color: #ffd966; font-size: clamp(9px,2.3vw,11px); }
        .sc.pl { flex: 1.4; text-align: left; padding-left: 5px; }

        /* ══ MASA ETRAFINDAKİ LAYOUT ══ */
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }

        /* ── Ana masa düzeni ── */
        .table-scene {
            margin-bottom: 8px;
            width: 100%;
            max-width: 520px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Üst / alt koltuk satırı */
        .outer-seat-row {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 8px 0;
        }

        /* Orta satır: sol koltuk | felt | sağ koltuk */
        .outer-mid-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }

        /* Felt sarmalayıcı — esnek genişlik */
        .felt-wrap {
            flex: 1;
            min-width: 0;
        }

        /* Oval felt — sadece oynanan kartları içerir, SABİT BOYUT */
        .felt {
            background: radial-gradient(ellipse at center, #2e7a3a 0%, #1a5228 55%, #0e3318 100%);
            border-radius: 80px;
            border: 4px solid #4a8a4a;
            box-shadow: inset 0 4px 20px rgba(0,0,0,0.5), 0 6px 24px rgba(0,0,0,0.5), 0 0 0 5px #1a4a1a;
            position: relative;
            height: 180px;
            min-height: 180px;
            max-height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: visible;
        }

        /* Oynanan kartlar + renk bilgisi — sabit grid */
        .played-area {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
            width: 170px;
            height: 150px;
            flex-shrink: 0;
        }
        .felt-center-info {
            grid-column: 2; grid-row: 2;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .felt-koz-sym { font-size: clamp(20px,6vw,30px); line-height: 1; }
        .felt-koz-lbl { font-size: clamp(7px,1.8vw,9px); color: #ffd966aa; font-weight: bold; }
        .felt-card-slot { display: flex; align-items: center; justify-content: center; }
        .felt-card-slot.top-slot    { grid-column: 2; grid-row: 1; align-items: flex-start; }
        .felt-card-slot.left-slot   { grid-column: 1; grid-row: 2; justify-content: flex-start; }
        .felt-card-slot.right-slot  { grid-column: 3; grid-row: 2; justify-content: flex-end; }
        .felt-card-slot.bottom-slot { grid-column: 2; grid-row: 3; align-items: flex-end; }

        .played-card {
            background: #fef7e0;
            border-radius: 8px;
            border: 1.5px solid #b8860b;
            box-shadow: -1px 2px 5px rgba(0,0,0,0.5);
            padding: 3px 6px;
            text-align: center;
            animation: cin 0.2s ease;
            min-width: 34px;
        }
        @keyframes cin { from{opacity:0;transform:scale(0.7)} to{opacity:1;transform:scale(1)} }
        .pc-val { font-size: clamp(14px,4.5vw,20px); font-weight: 900; line-height: 1; }
        .pc-koz-tag { font-size: 7px; background: #ff9800; color: #111; border-radius: 10px; padding: 0 3px; font-weight: bold; }

        /* ── Oyuncu koltuk kutusu (her 4 oyuncu için ortak) ── */
        .seat-box {
            background: rgba(0,0,0,0.55);
            border: 2px solid #4a7a4a;
            border-radius: 14px;
            padding: 6px 10px;
            text-align: center;
            transition: border-color 0.2s, background 0.2s;
            width: 84px;
            min-width: 84px;
            max-width: 84px;
            min-height: 72px;
            flex-shrink: 0;
            box-sizing: border-box;
        }
        .seat-box.act-seat { /* no highlight */ }
        .seat-box.ebe-seat { border-top: 3px solid #cc4444; }
        .seat-name { font-size: clamp(10px,3vw,14px); font-weight: 800; color: #d4c99a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .seat-name.you { color: #ffd966; }
        .seat-koz  { font-size: clamp(14px,4vw,20px); font-weight: 900; line-height: 1.1; }
        .seat-info { font-size: clamp(8px,2vw,10px); color: #8aaa8a; margin-top: 1px; white-space: nowrap; }
        .seat-turn-arrow {
            display: block;
            text-align: center;
            font-size: 14px;
            color: #ffd966;
            line-height: 1;
            margin-bottom: 3px;
            animation: blink 0.8s infinite;
        }

        /* Benim kartlarım — masa DIŞINDA, tek satır */
        .my-cards-area {
            width: 100%;
            max-width: 520px;
            margin: 6px auto 0;
            padding: 0 92px; /* 84px (koltuk genişliği) + 8px (gap) */
        }
        .cards-wrap-single {
            display: flex;
            flex-wrap: nowrap;
            overflow: visible;
            padding: 4px 2px 10px;
        }
        .cards-wrap-single .card {
            flex: 0 0 auto;
            margin-right: -18px; /* overlap */
            transition: transform 0.15s, box-shadow 0.15s, margin-right 0.15s;
            position: relative;
            z-index: 10;
        }
        .cards-wrap-single .card:last-child {
            margin-right: 0;
        }
        .cards-wrap-single .card:hover,
        .cards-wrap-single .card:focus {
            transform: translateY(-10px);
            z-index: 20;
            margin-right: 2px;
        }
        .cards-wrap-single .card.valid-card:hover {
            transform: translateY(-12px);
        }
        .my-hand-hdr { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; flex-wrap: wrap; }
        .my-name { font-size: clamp(13px,3.8vw,16px); font-weight: 900; color: #ffd966; }
        .kbadge { background: #f4a26120; border: 1px solid #f4a261; border-radius: 20px; padding: 1px 7px; font-size: clamp(9px,2.5vw,12px); color: #f4a261; font-weight: bold; }
        .tbadge { background: #ffd966; color: #1a2a1a; border-radius: 20px; padding: 1px 8px; font-size: clamp(9px,2.5vw,12px); font-weight: 900; animation: blink 1s infinite; }
        .my-cnt { margin-left: auto; font-size: clamp(9px,2.5vw,12px); color: #888; }
        .cards-wrap { display: flex; flex-wrap: wrap; gap: 5px; }
        .card {
            background: white; border-radius: 10px; border: 2px solid #b8860b;
            box-shadow: -2px 3px 6px rgba(0,0,0,0.45); cursor: pointer;
            min-width: 48px; min-height: 62px;
            display: flex; flex-direction: column; align-items: stretch; justify-content: space-between;
            padding: 3px 4px; position: relative; transition: transform 0.1s, box-shadow 0.1s;
        }
        .card:active { transform: scale(0.91) translateY(2px); }
        .card.valid-card { background: linear-gradient(160deg,#fffde4,#fff8c0); border-color: #ff9800; box-shadow: 0 0 0 2.5px #ff980070, -2px 3px 6px rgba(0,0,0,0.4); }
        .card.invalid-card { opacity: 0.38; cursor: not-allowed; }
        .card-corner { font-size: clamp(11px,3.2vw,14px); font-weight: 900; line-height: 1.05; }
        .card-corner.bot { transform: rotate(180deg); }
        .card-center { font-size: clamp(20px,6vw,28px); line-height: 1; text-align: center; flex: 1; display: flex; align-items: center; justify-content: center; }
        .card-koz-dot { position: absolute; top: -5px; left: -5px; width: 14px; height: 14px; background: #ff9800; border-radius: 50%; border: 1.5px solid white; font-size: 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 900; }
        .red-suit { color: #d42020; }
        .black-suit { color: #111; }

        /* ── Input / Action alanı ── */
        .input-area { background: #0f2f1a; border-radius: 18px; padding: 12px 14px; margin-bottom: 8px; text-align: center; }
        .ititle { font-size: clamp(13px,4vw,17px); font-weight: bold; color: #ffd966; margin-bottom: 8px; }
        .bid-row { display: flex; align-items: center; justify-content: center; gap: 8px; flex-wrap: wrap; margin: 8px 0; }
        .bid-num { font-size: clamp(20px,6vw,28px); font-weight: 900; padding: 8px 12px; border-radius: 12px; border: 2px solid #ffd966; background: rgba(0,0,0,0.6); color: #ffd966; width: 80px; text-align: center; -webkit-appearance: none; appearance: none; }
        .bid-num:focus { outline: none; border-color: #ffe599; }
        .btn { background: #d4af37; border: none; padding: clamp(8px,3vw,12px) clamp(14px,4vw,22px); font-size: clamp(13px,3.5vw,16px); font-weight: 900; border-radius: 50px; color: #1f3a1f; min-height: 44px; min-width: 80px; }
        .btn:active { transform: scale(0.95); filter: brightness(0.85); }
        .btn.fire { background: #e07020; color: #fff; }
        .btn.next { background: #2a8a3a; color: #d4f0d0; width: 100%; font-size: clamp(14px,4.5vw,19px); padding: 14px; }
        .rhint { font-size: clamp(11px,3vw,14px); background: rgba(0,0,0,0.4); border-radius: 10px; padding: 6px 10px; margin-top: 6px; color: #b8c8b0; line-height: 1.4; }
        .errmsg { background: #aa2e2ecc; color: #ffcccc; border-radius: 10px; padding: 6px 12px; font-size: clamp(11px,3vw,14px); margin-top: 6px; display: inline-block; }
        .warnmsg { background: rgba(200,130,0,0.6); color: #fff3c4; border-radius: 10px; padding: 5px 12px; font-size: clamp(11px,3vw,13px); margin-top: 6px; display: inline-block; }
        .waitlbl { font-size: clamp(14px,4vw,18px); color: #ffd966; padding: 8px 0; }
        .winban { background: #ffd700; color: #1a3a1a; border-radius: 50px; padding: 5px 16px; font-weight: 900; font-size: clamp(12px,3.5vw,16px); display: inline-block; animation: wp 0.4s ease; position: absolute; bottom: 50%; left: 50%; transform: translateX(-50%) translateY(50%); z-index: 10; white-space: nowrap; }
        @keyframes wp { from{transform:translateX(-50%) translateY(50%) scale(0.4);opacity:0} to{transform:translateX(-50%) translateY(50%) scale(1);opacity:1} }

        /* ── Log ── */
        .dbg-panel { background: #1a1a2e; border-radius: 14px; border: 1px solid #ffd96630; overflow: hidden; }
        .dbg-hdr { display: flex; justify-content: space-between; align-items: center; padding: 5px 8px; background: #0f0f1a; }
        .dbg-lbl { font-size: clamp(9px,2.5vw,12px); color: #ffd96680; }
        .dbg-btns { display: flex; gap: 4px; }
        .dbt { padding: 4px 10px; font-size: clamp(9px,2.5vw,11px); border: none; border-radius: 20px; font-weight: bold; min-height: 30px; cursor: pointer; }
        .dbt.cp { background: #2a5a2a; color: #aaffaa; }
        .dbt.cl { background: #5a2a2a; color: #ffaaaa; }
        .dbg-log { max-height: 128px; overflow-y: auto; padding: 5px 8px; font-family: monospace; font-size: clamp(9px,2.2vw,10px); scroll-behavior: smooth; }
        .dbg-log p { margin: 2px 0; color: #88cc88; border-left: 2px solid #ffd96640; padding-left: 6px; line-height: 1.4; }
        .dbg-log p.elog { color: #ff8888; border-left-color: #ff4444; }
        .dbg-log p.wlog { color: #ffaa66; border-left-color: #ffaa44; }
        .dbg-log p.sep { color: #ffd966; border-left-color: #ffd966; font-weight: bold; }
        .dbg-log p.ciklog { color: #66ff99; border-left-color: #33cc66; }
        .dbg-log p.batlog { color: #ff8888; border-left-color: #cc3333; }
        .dbg-log p.ellog  { color: #88ddff; border-left-color: #44aadd; background: rgba(0,100,180,0.08); border-radius:3px; }
        .dbg-log p.benlog { color: #ffdd88; border-left-color: #ddaa33; font-weight:bold; }

    
        /* ── LOBI ── */
        #lobby-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100dvh; padding: 24px 16px;
        }
        .lb-title { font-size: clamp(28px,8vw,44px); font-weight: 900; color: #ffd966; margin-bottom: 6px; letter-spacing: 3px; text-shadow: 0 2px 12px #0008; }
        .lb-sub { font-size: clamp(13px,3.5vw,17px); color: #b8c8b0; margin-bottom: 24px; text-align:center; }
        .lb-card { background: rgba(0,0,0,0.4); border: 2px solid #4a7a4a; border-radius: 18px; padding: 20px; width: 100%; max-width: 400px; margin-bottom: 14px; }
        .lb-label { font-size: 13px; color: #ffd966; font-weight: 700; margin-bottom: 6px; }
        .lb-input { width: 100%; background: rgba(255,255,255,0.1); border: 1px solid #ffd96660; border-radius: 8px; padding: 10px 14px; color: #fff; font-size: 16px; font-weight: 700; margin-bottom: 12px; }
        .lb-input::placeholder { color: #666; font-weight: 400; }
        .lb-input:focus { outline: none; border-color: #ffd966; }
        .lb-select { width: 100%; background: rgba(0,0,0,0.6); border: 1px solid #ffd96660; border-radius: 8px; padding: 10px 14px; color: #fff; font-size: 15px; margin-bottom: 0; }
        .lb-bigbtn { background: #2a8a3a; border: 2px solid #4aaa5a; border-radius: 50px; padding: 14px; font-size: clamp(15px,4.5vw,20px); font-weight: 900; color: #d4f0d0; width: 100%; max-width: 400px; cursor: pointer; box-shadow: 0 4px 18px #0a5f2a88; margin-bottom: 10px; }
        .lb-bigbtn:active { transform: scale(0.96); }
        .lb-secbtn { background: rgba(0,0,0,0.4); border: 2px solid #ffd96640; border-radius: 50px; padding: 10px; font-size: clamp(13px,4vw,17px); font-weight: 700; color: #ffd966; width: 100%; max-width: 400px; cursor: pointer; margin-bottom: 10px; }
        .oda-kodu-big { font-size: clamp(36px,10vw,56px); font-weight: 900; color: #ffd966; letter-spacing: 8px; text-align: center; background: rgba(0,0,0,0.4); border-radius: 14px; padding: 16px; width: 100%; max-width: 400px; margin-bottom: 12px; }
        .oyuncu-slot { display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.3); border-radius: 10px; padding: 10px 14px; margin-bottom: 8px; }
        .slot-renk { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
        .slot-adi { font-size: 15px; font-weight: 700; flex:1; }
        .slot-durum { font-size: 12px; }
        .lb-hata { color: #ff8888; font-size: 14px; margin-top: 6px; text-align:center; }

    </style>
</head>
<body>


<!-- ══ LOBİ ══ -->
<div id="lobby-screen">
    <div class="lb-title">♠ HERRO ♥</div>
    <div class="lb-sub">Online Kart Oyunu</div>
    <div id="lobby-menu">
        <button class="lb-bigbtn" id="lbYeniBtn">🎮 Yeni Oda Aç</button>
        <button class="lb-secbtn" id="lbKatilBtn">🔗 Odaya Katıl</button>
    </div>
    <div id="lobby-yeni" style="display:none;width:100%;max-width:400px;">
        <div class="lb-card">
            <div class="lb-label">Adın</div>
            <input class="lb-input" id="lbYeniAd" placeholder="Adını gir..." maxlength="10">
            <div class="lb-label">Kaç gerçek oyuncu?</div>
            <select class="lb-select" id="lbOyuncuSayisi">
                <option value="2">2 Gerçek + 2 Bot</option>
                <option value="3">3 Gerçek + 1 Bot</option>
                <option value="4" selected>4 Gerçek Oyuncu</option>
            </select>
        </div>
        <button class="lb-bigbtn" id="lbOdaOlusturBtn">ODA OLUŞTUR</button>
        <button class="lb-secbtn" id="lbYeniGeriBtn">← Geri</button>
        <div class="lb-hata" id="lbYeniHata"></div>
    </div>
    <div id="lobby-katil" style="display:none;width:100%;max-width:400px;">
        <div class="lb-card">
            <div class="lb-label">Adın</div>
            <input class="lb-input" id="lbKatilAd" placeholder="Adını gir..." maxlength="10">
            <div class="lb-label">Oda Kodu</div>
            <input class="lb-input" id="lbKatilKod" placeholder="5 haneli kod..." maxlength="5" style="text-transform:uppercase;letter-spacing:4px;font-size:22px;">
        </div>
        <button class="lb-bigbtn" id="lbKatilOnayBtn">KATIL</button>
        <button class="lb-secbtn" id="lbKatilGeriBtn">← Geri</button>
        <div class="lb-hata" id="lbKatilHata"></div>
    </div>
    <div id="lobby-bekleme" style="display:none;width:100%;max-width:400px;align-items:center;flex-direction:column;display:none;">
        <div class="lb-sub">Arkadaşlarına bu kodu gönder!</div>
        <div class="oda-kodu-big" id="lbOdaKoduGoster">-----</div>
        <div id="lbOyuncuListesi" style="width:100%;margin-bottom:12px;"></div>
        <div class="lb-sub" id="lbBeklemeInfo">Bekleniyor...</div>
        <button class="lb-bigbtn" id="lbBaslatBtn" style="display:none;">▶ OYUNU BAŞLAT</button>
    </div>
</div>


<!-- ══ OYUN ══ -->
<div id="game-screen" style="display:none;">
<div class="game-container">
    <div class="top-bar">
        <div class="game-title">♠ HERRO ♥</div>
        <div class="top-badges">
            <div class="badge" id="turn-indicator">Tur 1/12</div>
            <div class="badge" id="bid-total">Ihale: 0</div>
            <div class="badge" id="oda-badge">-</div>
        </div>
    </div>
    <div class="score-table" id="score-panel"></div>
    <div class="table-scene" id="table-scene"></div>
    <div class="input-area" id="input-panel"><div class="waitlbl">Yukleniyor...</div></div>
    <div class="dbg-panel">
        <div class="dbg-hdr">
            <span class="dbg-lbl">OYUN LOGLARI</span>
            <div class="dbg-btns">
                <button class="dbt cp" id="copyBtn">Kopyala</button>
                <button class="dbt cl" id="clearBtn">Temizle</button>
            </div>
        </div>
        <div class="dbg-log" id="logArea"><p>Yukleniyor...</p></div>
    </div>

    if(bot===OY[ebeIdx]&&ihaleToplam===0&&bI===0) bI=3;

async function mpBotOyna(){

    if(idx!==-1) el.splice(idx,1); else{kart=el[0];el.splice(0,1);}
    eller[bot] = el;
    var isAcici = !bSeri;
    if(!bSeri) bSeri=kart[0];
    var cak=(kart[0]===kozlar[bot]&&bSeri!==kozlar[bot]);

async function mpElBitti(){
    var kaz = mpElKazanan();
    alinan[kaz]=(alinan[kaz]||0)+1;
    log('── El '+elNo+' kazananı: '+kaz+' (toplam: '+alinan[kaz]+') ──');

    if(felt){
        var ban=document.createElement('div'); ban.className='winban'; ban.textContent='🏆 '+kaz;
        felt.appendChild(ban);
        setTimeout(function(){if(ban.parentNode)ban.parentNode.removeChild(ban);},1000);
    }
    // 1.2 saniye bekle, herkes görsün
    await new Promise(function(r){setTimeout(r,1200);});
    // Şimdi temizle
    yerde=[]; bSeri=null;
    if(elNo>13){
        await mpTurBitir(); return;
    }
    var guncel = {alinan:alinan, el_no:elNo, sira:sira, yerde:[], b_seri:'', durum:'basliyor'};

function mpElKazanan(){
    if(!yerde.length) return OY[0];
    var wO=yerde[0][0],wK=yerde[0][1],wKoz=yerde[0][2]||false;
    var acilisSeri=yerde[0][1][0];
    for(var i=1;i<yerde.length;i++){
        var cO=yerde[i][0],cK=yerde[i][1],cKoz=yerde[i][2]||false;
        if(cKoz){if(wKoz){if(DS[cK[1]]>DS[wK[1]]){wO=cO;wK=cK;wKoz=cKoz;}}else{wO=cO;wK=cK;wKoz=cKoz;}}
        else if(!wKoz){
            if(cK[0]===acilisSeri&&wK[0]===acilisSeri){if(DS[cK[1]]>DS[wK[1]]){wO=cO;wK=cK;}}
            else if(cK[0]===acilisSeri){wO=cO;wK=cK;}
        }
    }
    log('Kazanan: '+wO+' '+wK[0]+' '+wK[1]+(wKoz?' (KOZ)':''));
    return wO;
}

async function mpTurBitir(){
    var cik=OY.filter(function(o){return alinan[o]===(ihale[o]||0);});
    var bat=OY.filter(function(o){return alinan[o]!==(ihale[o]||0);});
    log('━━━━━ TUR '+buyukTur+' SKOR HESABI ━━━━━');
    OY.forEach(function(o){
        var s=ihale[o]||0,a=alinan[o]||0,fark=Math.abs(s-a),p=0,detay=[];
        if(cik.indexOf(o)>-1){
            var base=(s===0?5:s); p=base;
            if(o===OY[ebeIdx]){p+=10;detay.push('+10ebe');}
            if(bat.length===3){p+=10;detay.push('+10tekcikan');}
            if(herro[o]){p*=2;detay.push('x2herro');}
            log('[CIKTI] '+o+': '+s+'/'+a+' | '+detay.join(',')+'=+'+p);
        } else {
            var base=(s===0?5:s); p=-(base+(fark*fark));
            if(bat.length===1){p-=10;detay.push('-10tekbatan');}
            if(herro[o]){p*=2;detay.push('x2herro');}
            log('[BATTI] '+o+': '+s+'/'+a+' fark='+fark+' | '+detay.join(',')+'='+p);
        }
        skorlar[o]=(skorlar[o]||0)+p;
    });
    log('━━━ '+OY.map(function(o){return o+'='+skorlar[o];}).join(' | ')+' ━━━');
    ebeIdx=(ebeIdx+1)%4; buyukTur++;
    if(buyukTur>12){
        var ent=Object.keys(skorlar).map(function(k){return[k,skorlar[k]];});
        ent.sort(function(a,b){return b[1]-a[1];});
        chatEkle(ent[0][0],'Recep abi hesabı '+ent[ent.length-1][0]+"'den al! 💸");
        await sb.from('oyun').update({skorlar:skorlar,oyun_aktif:false,tur_bitti:true,durum:'bitti',yerde:[],b_seri:''}).eq('id',odaId);
        setTimeout(function(){alert('OYUN BİTTİ!\nKAZANAN: '+ent[0][0]+' ('+ent[0][1]+' puan)');},800);
        return;
    }
    // Yeni tur hazırla
    var suits=['Maca','Karo','Sinek','Kupa'];
    for(var i=0;i<OY.length;i++) kozlar[OY[i]]=suits[i%4];
    var deste=[];
    suits.forEach(function(s){Object.keys(DS).forEach(function(r){deste.push([s,r]);});});
    for(var i=deste.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=deste[i];deste[i]=deste[j];deste[j]=t;}
    var yeniEller={}, yeniAlinan={};
    for(var i=0;i<OY.length;i++){
        yeniEller[OY[i]]=sirala(deste.slice(i*13,i*13+13),kozlar[OY[i]]);
        yeniAlinan[OY[i]]=0;
    }
    var yeniSira = OY[(ebeIdx+1)%4]; // ebeIdx zaten artırıldı
    var guncel={
        eller:yeniEller, kozlar:kozlar, ihale:{}, herro:{}, alinan:yeniAlinan,
        skorlar:skorlar, ebe_idx:ebeIdx, buyuk_tur:buyukTur, sira:yeniSira,
        b_seri:'', yerde:[], ihale_as:true, oyun_aktif:true, tur_bitti:false,
        ihale_toplam:0, el_no:0, durum:'basliyor'
    };
    await sb.from('oyun').update(guncel).eq('id',odaId);
}

/* ── KURAL ── */
// Masadaki tüm koz kartlarının en yüksek değerini bul
// (her oyuncunun kendi kozunu oynadığı kartlar, suit fark etmeksizin rank karşılaştırması)
function maxKozRankOnTable(yer) {
    var maxV = -1;
    yer.forEach(function(item) {
        var kart = item[1], isCak = item[2];
        // Sadece gercek cakma kartlarini say (item[2]===true)
        // Normal acilista kendi kozu oynanirsa cakma sayilmaz
        if (isCak && DS[kart[1]] > maxV) maxV = DS[kart[1]];
    });
    return maxV;
}

function gecerli(kart,el,mSeri,kozR,yer){
    if(!mSeri) return true;
    if(!el||!el.length) return false;
    var ayni=el.filter(function(k){return k[0]===mSeri;});
    var kozL=el.filter(function(k){return k[0]===kozR;});
    if(ayni.length>0) return kart[0]===mSeri;
    if(kozL.length>0){
        if(kart[0]!==kozR) return false;
        // Masada herhangi bir oyuncunun kozu var mı? (suit bağımsız rank karşılaştırması)
        var maxV = maxKozRankOnTable(yer);
        if(maxV >= 0){
            var byk=kozL.filter(function(k){return DS[k[1]]>maxV;});
            if(byk.length>0) return byk.some(function(k){return k[0]===kart[0]&&k[1]===kart[1];});
        }
        return true;
    }
    return true;
}
function acikla(el,mSeri,kozR,yer){
    if(!mSeri) return 'İlk kartı istediğiniz gibi atabilirsiniz.';
    var ayni=el.filter(function(k){return k[0]===mSeri;});
    var kozL=el.filter(function(k){return k[0]===kozR;});
    if(ayni.length>0) return 'Elinizde '+mSeri+' var! Bu renkten atmak ZORUNDASINIZ.';
    if(kozL.length>0){
        var maxV = maxKozRankOnTable(yer);
        if(maxV >= 0){
            var buyukKoz = kozL.filter(function(k){return DS[k[1]]>maxV;});
            if(buyukKoz.length>0) return 'Masada KOZ var! Yerdeki en büyük kozdan BÜYÜK kozunuzu atmalısınız!';
            return 'Masada KOZ var ama daha büyük kozunuz yok. Herhangi bir KOZ atabilirsiniz.';
        }
        return 'Elinizde '+mSeri+' yok! KOZ ('+kozR+') atmak ZORUNDASINIZ!';
    }
    return 'Elinizde '+mSeri+' yok, KOZ da yok. İstediğiniz kartı atabilirsiniz.';
}

/* ── TAKİP: Oynanan kartlar & renksizlik ── */
var oynananKartlar = [];  // Bu turda oynanan tüm kartlar
var renksizler = {};      // {oyuncu: {renk: true}} — çakma bilgisi

function kartOynandiMi(renk, deg) {
    return oynananKartlar.some(function(k){ return k[0]===renk && k[1]===deg; });
}

// Bu renkte henüz oynanmamış kartlar
function kalanKartlar(renk) {
    var tumRanklar = ['A','K','Q','J','10','9','8','7','6','5','4','3','2'];
    return tumRanklar.filter(function(r){ return !kartOynandiMi(renk, r); });
}

// Bu kart bu renkte kalan en büyük mü?
function kartGuclu(kart, kozR) {
    var rank_order = ['A','K','Q','J','10','9','8','7','6','5','4','3','2'];
    for(var i=0; i<rank_order.length; i++) {
        if(DS[rank_order[i]] <= DS[kart[1]]) break;
        if(!kartOynandiMi(kart[0], rank_order[i])) return false;
    }
    return true;
}

// Bu kart ileride rakiplerden biri tarafından kesilebilir mi?
// (koz atılabilecek oyuncu varsa veya daha büyük kart kaldıysa)
function kartKesilebilir(kart, kozR, botIsmi) {
    var s = kart[0], r = kart[1];
    // Koz ise: daha büyük koz kaldı mı başka ellerde?
    if(s === kozR) {
        var kalan = kalanKartlar(kozR);
        // Benim elimdeki kozları çıkar
        var benimKozlar = (eller[botIsmi]||[]).filter(function(k){return k[0]===kozR;}).map(function(k){return k[1];});
        var disKoz = kalan.filter(function(r2){ return !benimKozlar.some(function(bk){return bk===r2;}); });
        return disKoz.some(function(r2){ return DS[r2] > DS[r]; });
    }
    // Normal kart: bu renkte daha büyük kalan var mı?
    var kalanBuyuk = kalanKartlar(s).filter(function(r2){ return DS[r2] > DS[r]; });
    // Benim elimdeki büyükleri çıkar
    var benimBuyuk = (eller[botIsmi]||[]).filter(function(k){return k[0]===s && DS[k[1]]>DS[r];});
    var disBuyuk = kalanBuyuk.filter(function(r2){
        return !benimBuyuk.some(function(bk){return bk[1]===r2;});
    });
    // Eğer rakipler bu renkte daha büyük kart tutuyorsa kesilebilir
    // Veya herhangi bir rakip bu renge renksizse koz atabilir
    var rakipRenksiz = OY.some(function(o){
        return o!==botIsmi && renksizler[o] && renksizler[o][s];
    });
    return disBuyuk.length > 0 || rakipRenksiz;
}

// Bir kartın kaç tane daha büyük rakip kartı kaldığını say
function kacBuyukKaldi(kart) {
    var kalan = kalanKartlar(kart[0]);
    return kalan.filter(function(r){ return DS[r] > DS[kart[1]]; }).length;
}

// Elimdeki her kartı analiz et: kesin alır / alabilir / kaybedeceği garantili
function kartDegerlendirme(kart, botIsmi, kozR) {
    if(kartGuclu(kart, kozR)) return 'KESIN_KAZANIR';
    // Kez kesilebilir mi?
    if(kartKesilebilir(kart, kozR, botIsmi)) return 'KAYBEDECEĞI';
    return 'BELIRSIZ';
}

// Elimde kesin kazanan, belirsiz ve kesin kaybeden kaç kart var?
function elGucu(el, botIsmi, kozR) {
    var kesin=0, belirsiz=0, kaybedeceği=0;
    el.forEach(function(k){
        var d = kartDegerlendirme(k, botIsmi, kozR);
        if(d==='KESIN_KAZANIR') kesin++;
        else if(d==='BELIRSIZ') belirsiz++;
        else kaybedeceği++;
    });
    return {kesin:kesin, belirsiz:belirsiz, kaybedeceği:kaybedeceği};
}
function mevcutKazanan(yer, kozR) {
    if(!yer.length) return null;
    var wK=yer[0][1], wO=yer[0][0];
    for(var i=1;i<yer.length;i++){
        var cK=yer[i][1], cO=yer[i][0];
        var wKoz=(wK[0]===kozR), cKoz=(cK[0]===kozR);
        if(cKoz&&!wKoz){wK=cK;wO=cO;}
        else if(wKoz&&cKoz&&DS[cK[1]]>DS[wK[1]]){wK=cK;wO=cO;}
        else if(!wKoz&&!cKoz&&cK[0]===wK[0]&&DS[cK[1]]>DS[wK[1]]){wK=cK;wO=cO;}
    }
    return {kart:wK, oyuncu:wO};
}
function kartKazanirMi(kart, yer, mSeri, kozR) {
    var simYer = yer.concat([[null, kart, kart[0]===kozR && mSeri!==kozR]]);
    var kaz = mevcutKazanan(simYer, kozR);
    return kaz && kaz.kart[0]===kart[0] && kaz.kart[1]===kart[1];
}
function sonrakiOyuncuRenksizMi(bot, pozisyon, mSeri) {
    for(var i=1; i<=(3-pozisyon); i++){
        var snOy = OY[(OY.indexOf(bot)+i)%4];
        if(renksizler[snOy] && renksizler[snOy][mSeri]) return true;
    }
    return false;
}
function trackRenksiz(oyuncu, beklenenRenk, attigiKart) {
    if(beklenenRenk && attigiKart[0] !== beklenenRenk) {
        if(!renksizler[oyuncu]) renksizler[oyuncu] = {};
        if(!renksizler[oyuncu][beklenenRenk]) {
            renksizler[oyuncu][beklenenRenk] = true;
            log('[TAKİP] '+oyuncu+' '+beklenenRenk+' rengine renksiz!');
        }
    }
}

/* ── KAÇMA STRATEJİSİ (0 ihale veya kota doldu) ──
   Hafıza destekli: kalan kartları bilerek en akıllı kaybetme kararı al.
   - Açarken: kesin kaybedecek en büyük kartı aç (rakip onu alır, sen kurtuluş)
   - Takipken: kazanmayacak en büyük kartı at (büyükleri yak, küçükleri sakla) */
function kacStrategy(gec, yer, mSeri, kozR, botIsmi) {
    var isim = botIsmi || '';

    if(yer.length===0){
        // Açıcı: kesin kaybedeceğim en büyük kartı aç
        var nk = gec.filter(function(k){return k[0]!==kozR;});
        var pool = nk.length ? nk : gec;
        // Kesin kaybedecek (rakipte daha büyük var) — en büyüğünü aç (değer harca)
        var kesinKay = pool.filter(function(k){
            return kartDegerlendirme(k, isim, kozR) === 'KAYBEDECEĞI';
        });
        if(kesinKay.length) return kesinKay.reduce(function(a,b){return DS[a[1]]>DS[b[1]]?a:b;});
        // Belirsiz — en küçüğünü aç (kazanma riski az)
        return pool.reduce(function(a,b){return DS[a[1]]<DS[b[1]]?a:b;});
    }

    // Takipçi: kazanmayacak kartlar arasından en büyüğünü at
    var losing = gec.filter(function(k){return !kartKazanirMi(k,yer,mSeri,kozR);});
    if(losing.length){
        // Koz olmayan kaybedenler arasında: kesin kaybedecek en büyük
        var nkL = losing.filter(function(k){return k[0]!==kozR;});
        var pool = nkL.length ? nkL : losing;
        // En büyüğünü at (değersiz büyük kartları yak)
        return pool.reduce(function(a,b){return DS[a[1]]>DS[b[1]]?a:b;});
    }
    // Hepsi kazanıyor — en küçüğünü at (en az değerli)
    return gec.reduce(function(a,b){return DS[a[1]]<DS[b[1]]?a:b;});
}

/* ── YARDIMCI: yan renklerde en büyük A/K bul ── */
function enBuyukYanKart(gec, kozR) {
    // As öncelikli, sonra K — koz olmayan
    var yanAs = gec.filter(function(k){ return k[0]!==kozR && k[1]==='A'; });
    if(yanAs.length) return yanAs[0];
    var yanK = gec.filter(function(k){ return k[0]!==kozR && k[1]==='K'; });
    if(yanK.length) return yanK[0];
    return null;
}

/* ── AÇICI STRATEJİSİ (hafıza destekli) ──
   Kalan kartları bilerek: kesin kazanan > güçlü > koz > diğer */
function aciStrategy(bot, el, gec, kozR, kalan, elKalan) {
    // 1. Kesin kazanan koz-dışı kartlar (hafıza: üstünde hiç kart kalmamış)
    var kesinKaz = gec.filter(function(k){
        return k[0]!==kozR && kartDegerlendirme(k,bot,kozR)==='KESIN_KAZANIR';
    });
    if(kesinKaz.length){
        // Renksiz rakip olan rengi atla
        var guvenli = kesinKaz.filter(function(k){
            return !sonrakiOyuncuRenksizMi(bot,0,k[0]);
        });
        var pool = guvenli.length ? guvenli : kesinKaz;
        // En büyüğünü aç
        return pool.reduce(function(a,b){return DS[a[1]]>DS[b[1]]?a:b;});
    }

    // 2. Belirsiz ama iyi pozisyonlu koz-dışı (az rakip kart kaldı üstünde)
    var iyi = gec.filter(function(k){
        if(k[0]===kozR) return false;
        return kacBuyukKaldi(k) <= 1; // en fazla 1 rakip kart üstte
    });
    if(iyi.length){
        var guvenli = iyi.filter(function(k){
            return !sonrakiOyuncuRenksizMi(bot,0,k[0]);
        });
        var pool = guvenli.length ? guvenli : iyi;
        return pool.reduce(function(a,b){return DS[a[1]]>DS[b[1]]?a:b;});
    }

    // 3. Koza geç (rakiplerin kozunu çek)
    var kozCards = gec.filter(function(k){return k[0]===kozR;});
    // Kesin kazanan koz varsa aç
    var kesinKoz = kozCards.filter(function(k){return kartGuclu(k,kozR);});
    if(kesinKoz.length && kalan >= elKalan * 0.5){
        return kesinKoz.reduce(function(a,b){return DS[a[1]]>DS[b[1]]?a:b;});
    }
    if(kozCards.length && kalan >= elKalan * 0.6){
        return kozCards.reduce(function(a,b){return DS[a[1]]>DS[b[1]]?a:b;});
    }

    // 4. Kaybedecek kartların en büyüğünü aç (değer harca, sonraya iyi kartlar kalsın)
    var kaybedeceği = gec.filter(function(k){
        return k[0]!==kozR && kartDegerlendirme(k,bot,kozR)==='KAYBEDECEĞI';
    });
    if(kaybedeceği.length){
        return kaybedeceği.reduce(function(a,b){return DS[a[1]]>DS[b[1]]?a:b;});
    }

    // 5. Hepsini tüket: en büyük koz-dışı
    var nonKoz = gec.filter(function(k){return k[0]!==kozR;});
    if(nonKoz.length) return nonKoz.reduce(function(a,b){return DS[a[1]]>DS[b[1]]?a:b;});
    return gec.reduce(function(a,b){return DS[a[1]]>DS[b[1]]?a:b;});
}

/* ── TAKİP STRATEJİSİ (hafıza destekli) ──
   Kalan kartları bilerek takip et. Hedef: tam almak. */
function takipStrategy(bot, gec, yer, mSeri, kozR, kalan, elKalan, poz) {
    var curW = mevcutKazanan(yer, kozR);

    // Kazanabilecek tüm kartlar
    var gecenler = gec.filter(function(k){ return kartKazanirMi(k,yer,mSeri,kozR); });

    // ── 4. kişi (son oynayan) — en iyi pozisyon ──
    if(poz===3){
        if(curW && curW.oyuncu===bot){
            // Zaten kazanıyorum → min kazananla al (büyükleri ileride kullan)
            var kazKartlar=gec.filter(function(k){return kartKazanirMi(k,yer,mSeri,kozR);});
            if(kazKartlar.length) return kazKartlar.reduce(function(a,b){return DS[a[1]]<DS[b[1]]?a:b;});
            return gec.reduce(function(a,b){return DS[a[1]]<DS[b[1]]?a:b;});
        }
        if(gecenler.length){
            // Kesinlikle al — min kazanan yeterli
            return gecenler.reduce(function(a,b){return DS[a[1]]<DS[b[1]]?a:b;});
        }
        // Geçemiyorum — kritikse koz çak
        if(kalan>0 && kalan >= elKalan*0.8){
            var kozCards=gec.filter(function(k){return k[0]===kozR;});
            if(kozCards.length) return kozCards.reduce(function(a,b){return DS[a[1]]>DS[b[1]]?a:b;});
        }
        return kacStrategy(gec,yer,mSeri,kozR,bot);
    }

    // ── 2. veya 3. kişi ──
    if(gecenler.length){
        var cakmaRiski = sonrakiOyuncuRenksizMi(bot,poz,mSeri);

        // Sonraki oyuncu çakabilir mi? → en güçlüyle al, onu yenilgiye uğrat
        if(cakmaRiski){
            return gecenler.reduce(function(a,b){return DS[a[1]]>DS[b[1]]?a:b;});
        }

        // Hafıza: sonraki oyuncuların elinde bu renkte büyük kart kaldı mı?
        // Sonraki oyuncular büyük kart tutuyorsa → en güçlüyle al
        var sonrakiGuclu = false;
        for(var si=poz+1; si<4; si++){
            var snOy = OY[(OY.indexOf(bot)+si)%4]; // yaklaşık
            // Renkte kalan büyük kartlar var ve o oyuncunun renksiz olduğu bilinmiyor
            if(!(renksizler[snOy] && renksizler[snOy][mSeri])){
                // Masada en büyüğümüzden büyük kalan var mı?
                var enBuyukGecen = gecenler.reduce(function(a,b){return DS[a[1]]>DS[b[1]]?a:b;});
                var kalanBuyukRakip = kalanKartlar(mSeri).filter(function(r){
                    return DS[r] > DS[enBuyukGecen[1]];
                });
                if(kalanBuyukRakip.length > 0) sonrakiGuclu = true;
            }
        }

        if(sonrakiGuclu){
            // Sonraki güçlü kart tutabilir → en güçlüyle al
            return gecenler.reduce(function(a,b){return DS[a[1]]>DS[b[1]]?a:b;});
        }

        // Güvenli: min kazananla al
        return gecenler.reduce(function(a,b){return DS[a[1]]<DS[b[1]]?a:b;});
    }

    // Geçemiyorum
    if(kalan > 0){
        var kozCards = gec.filter(function(k){return k[0]===kozR;});
        if(kozCards.length){
            // Masada en büyük kozdan büyük kozum var mı?
            var curMaxKozV = curW && curW.kart[0]===kozR ? DS[curW.kart[1]] : -1;
            var buyukKoz = kozCards.filter(function(k){return DS[k[1]]>curMaxKozV;});
            // Kritiklik hesabı: ne kadar kalan var, ne kadar lazım
            if(buyukKoz.length && (kalan >= elKalan*0.5 || kalan >= 2)){
                // En küçük geçen kozla çak (büyük kozları sakla)
                return buyukKoz.reduce(function(a,b){return DS[a[1]]<DS[b[1]]?a:b;});
            }
        }
        // Koz çakamıyorum ama el lazım → hafızayla değerlendir
        // Gelecekte alabilecek misin? Hafızadan kontrol et
        var elG = elGucu(gec, bot, kozR);
        if(elG.kesin > kalan - 1){
            // Sonradan kazanabilirim → şimdi en büyük kaybedeni at
            return kacStrategy(gec,yer,mSeri,kozR,bot);
        }
    }

    return kacStrategy(gec,yer,mSeri,kozR,bot);
}

/* ── ANA BOT HAMLE FONKSİYONU ── */
function botHamle(bot, el, yer, mSeri, kozR) {
    if(!el||!el.length){log('HATA: '+bot+' eli bos!');return null;}
    var gec=el.filter(function(k){return gecerli(k,el,mSeri,kozR,yer);});
    if(!gec.length) gec=el.slice();
    var hedef=ihale[bot]||0, suAn=alinan[bot]||0;
    var kalan=hedef-suAn;
    var elKalan=13-elNo+1;
    var poz=yer.length;

    // 0 ihale → daima kaç
    if(hedef===0) return kacStrategy(gec,yer,mSeri,kozR,bot);

    // Tam aldı (kalan<=0) → her pozisyonda kozunu at, yoksa kaç
    if(kalan<=0){
        var kozCards=gec.filter(function(k){return k[0]===kozR;});
        if(kozCards.length) return kozCards.reduce(function(a,b){return DS[a[1]]>DS[b[1]]?a:b;});
        return kacStrategy(gec,yer,mSeri,kozR,bot);
    }

    // Açıcı pozisyon
    if(poz===0) return aciStrategy(bot,el,gec,kozR,kalan,elKalan);

    // Takipçi pozisyon
    return takipStrategy(bot,gec,yer,mSeri,kozR,kalan,elKalan,poz);
}

/* ── İHALE: Başarılı el analizine göre kalibrasyon ── */
/*
   DOĞRULANAN ELLER (sadece tam çıkan eller):
   Koz=4KJ + YanA=1 + YanK=1 + Renksiz=0 → 4 ⚡HERRO
   Koz=3   + YanA=1 + YanK=0 + Renksiz=0 → 3
   Koz=4AJ + YanA=1 + YanK=0 + Renksiz=0 → 3 ⚡HERRO
   Koz=5K  + YanA=2 + YanK=1 + Renksiz=0 → 5 ⚡HERRO
   Koz=5KQ + YanA=0 + YanK=0 + Renksiz=1 → 3 (yüksek koz ama yan güç yok)
   Koz=2   + YanA=1 + YanK=0 + Renksiz=0 → 0
   Koz=3   + YanA=1 + YanK=1 + Renksiz=0 → 3

   HERRO KURALI: Koz≥4 VE (KozA veya KozK) VE YanA≥1
   — Yan destek olmadan (YanA=0) HERRO YAPILMAZ (Koz=5KQ + Renksiz ama YanA=0 → no herro)
*/
function botIhale(el, koz) {
    if(!el) return {val:0, isHerro:false};

    var kozL = el.filter(function(k){return k[0]===koz;});
    var kozSay = kozL.length;
    var kd = kozL.map(function(k){return k[1];});
    var hasKozA = kd.indexOf('A') > -1;
    var hasKozK = kd.indexOf('K') > -1;
    var hasKozQ = kd.indexOf('Q') > -1;
    var hasKozJ = kd.indexOf('J') > -1;

    var yanAs=0, yanK=0, yanRenksiz=0, yanTek=0;
    SUITS.forEach(function(s) {
        if(s===koz) return;
        var cards = el.filter(function(k){return k[0]===s;});
        var ranks = cards.map(function(k){return k[1];});
        if(cards.length===0) yanRenksiz++;
        else if(cards.length===1) yanTek++;
        if(ranks.indexOf('A')>-1) yanAs++;
        if(ranks.indexOf('K')>-1) yanK++;
    });

    // ── 0 EŞİĞİ ──
    // Doğrulanan: Koz=2, KozA/K yok, YanA=1, YanK=0 → 0
    // Koz zayıfsa ve yan destek de yoksa → 0
    if(kozSay === 0) return {val:0, isHerro:false};
    if(kozSay === 1 && !hasKozA && !hasKozK) return {val:0, isHerro:false};
    if(kozSay === 2 && !hasKozA && !hasKozK && yanAs <= 1 && yanK === 0) return {val:0, isHerro:false};

    // ── BAZ BİD (koz sayısından) ──
    // Koz=3 → daima 3 (yan güç bid'i değiştirmiyor: YanA+YanK=2 bile 3 kalıyor)
    // Koz=4 → genelde 3, çok güçlü yan ile 4
    // Koz=5 → yan güce göre 3-5
    // Koz=6+ → daha yüksek
    var baseBid;
    if(kozSay <= 2) baseBid = 3;
    else if(kozSay === 3) baseBid = 3;
    else if(kozSay === 4) baseBid = 3;
    else if(kozSay === 5) baseBid = 3;   // DÜŞÜK başla, yan güç artırsın
    else if(kozSay === 6) baseBid = 4;
    else if(kozSay === 7) baseBid = 5;
    else baseBid = Math.min(kozSay - 1, 11);

    // ── YAN GÜÇ BONUSU ──
    // Doğrulanan: YanA çok önemli, YanK ikincil
    // Koz=5+YanA=2+YanK=1 → +2 (3→5)
    // Koz=4+YanA=1+YanK=1 → +1 (3→4)
    // Koz=3+YanA=1+YanK=1 → +0 (3 kalıyor!) — koz=3'te yan güç bid artırmıyor
    var yanPuan = 0;
    if(kozSay >= 4) {
        yanPuan += yanAs * 0.7;          // her yan As: +0.7
        yanPuan += yanK * 0.4;           // her yan K: +0.4
    }
    // Koz yüksek kartları (4+ kozda)
    if(kozSay >= 4 && hasKozK) yanPuan += 0.2;
    if(kozSay >= 4 && hasKozA) yanPuan += 0.3;
    // Renksizlik yalnız başına zayıf: Koz=5KQ+Renksiz+YanA=0 → 3
    // Yani renksizlik YAN DESTEK OLMADAN bonus vermiyor
    if(yanRenksiz >= 1 && yanAs >= 1) yanPuan += 0.4;

    var fin = baseBid + Math.round(yanPuan);
    fin = Math.max(3, Math.min(fin, 11));

    // ── HERRO KARARI ──
    // KURAL: Koz≥4 VE (KozA veya KozK) VE YanA≥1
    // Doğrulanan herro'lar:
    //   Koz=4K+J, YanA=1, YanK=1 → 4 ⚡
    //   Koz=4A+J, YanA=1, YanK=0 → 3 ⚡
    //   Koz=5K, YanA=2, YanK=1   → 5 ⚡
    // Herro YAPILMAYAN: Koz=5K+Q, YanA=0 → 3 (YAN DESTEK YOK → NO HERRO)
    var isHerro = false;
    if(fin >= 3 && kozSay >= 4 && (hasKozA || hasKozK) && yanAs >= 1) {
        isHerro = true;
        // Ekstra güvenlik: 6+ koz + yan destek → her zaman herro
        // 4-5 koz + sadece K (A yok) + tek yanA → herro ama temkinli (zaten kapsandı)
    }

    return {val: fin, isHerro: isHerro};
}

function sirala(el,koz){
    var g={}; SUITS.forEach(function(s){g[s]=[];});
    el.forEach(function(k){if(g[k[0]])g[k[0]].push(k);});
    SUITS.forEach(function(s){g[s].sort(function(a,b){return DS[a[1]]-DS[b[1]];});});
    var sMap={Kupa:['Kupa','Maca','Karo','Sinek'],Karo:['Karo','Sinek','Kupa','Maca'],Maca:['Maca','Kupa','Sinek','Karo'],Sinek:['Sinek','Karo','Maca','Kupa']};
    var ord=sMap[koz]||SUITS; var r=[];
    ord.forEach(function(s){r=r.concat(g[s]||[]);}); return r;
}

function elKazanan(){
    if(!yerde.length)return null;
    var wO=yerde[0][0],wK=yerde[0][1],wKoz=yerde[0][2]||false;
    for(var i=1;i<yerde.length;i++){
        var cO=yerde[i][0],cK=yerde[i][1],cKoz=yerde[i][2]||false;
        if(cKoz){if(wKoz){if(DS[cK[1]]>DS[wK[1]]){wO=cO;wK=cK;wKoz=cKoz;}}else{wO=cO;wK=cK;wKoz=cKoz;}}
        else if(!wKoz){
            if(cK[0]===bSeri&&wK[0]===bSeri){if(DS[cK[1]]>DS[wK[1]]){wO=cO;wK=cK;}}
            else if(cK[0]===bSeri){wO=cO;wK=cK;}
        }
    }
    log('Kazanan: '+wO+' '+wK[0]+' '+wK[1]+(wKoz?' (KOZ)':''));
    return wO;
}

    if(!isH&&val!==0&&(val<3||val>13)){showE('1-2 yasak! 0 veya 3-13 girin.');return;}
    if(!isH&&sira===OY[ebeIdx]&&val===yasak&&yasak>=0){showE('Yasak! İhale toplamı 13 olamaz!');return;}
    if(!isH&&sira===OY[ebeIdx]&&ihaleToplam===0&&val===0){showE('Açmak zorundasın!');return;}
    ihale[sira]=val; ihaleToplam+=val; herro[sira]=isH;
    log(sira+' '+val+' ihale'+(isH?' (HERRO)':'')+' verdi. Toplam:'+ihaleToplam);

        // İhale toplamına göre espiri

function botIhaleAdim(){
    var bot=sira;
    var res=botIhale(eller[bot],kozlar[bot]);
    var bI=res.val, bH=res.isHerro;
    var yas=(bot===OY[ebeIdx])?(13-ihaleToplam):-1;
    if(bot===OY[ebeIdx]&&bI===yas&&yas>=0) bI=(yas===0?3:(yas===3?4:(yas>3?yas-1:yas+1)));
    if(bot===OY[ebeIdx]&&ihaleToplam===0&&bI===0) bI=3;
    if(bH&&bI<3) bI=3;
    ihale[bot]=bI; herro[bot]=bH; ihaleToplam+=bI;
    log(bot+' '+bI+' ihale'+(bH?' (HERRO!)':'')+' verdi. Toplam:'+ihaleToplam);
    ihaleBalonla(bot,bI,bH);
    setTimeout(sonrakiIhale,400);
}

function dongu(){
    if(donguCalisiyor||bekleniyor)return;
    if(sira===BENIM_ADIM){render();return;}
    if(!eller[sira]||!eller[sira].length){log('HATA: '+sira+' eli bos!');return;}
    donguCalisiyor=true;
    setTimeout(function(){
        var kart=botHamle(sira,eller[sira],yerde,bSeri,kozlar[sira]);
        if(!kart){donguCalisiyor=false;return;}
        var idx=eller[sira].findIndex(function(k){return k[0]===kart[0]&&k[1]===kart[1];});
        if(idx!==-1) eller[sira].splice(idx,1); else{kart=eller[sira][0];eller[sira].splice(0,1);}
        var isAcici = !bSeri;
        if(!bSeri){bSeri=kart[0];log('── EL '+elNo+' BAŞLADI ── Açan: '+sira+' | '+kart[0]+' '+kart[1]);}
        var cak=(kart[0]===kozlar[sira]&&bSeri!==kozlar[sira]);
        yerde.push([sira,kart,cak]);
        log(sira+' → '+kart[0]+' '+kart[1]);
        donguCalisiyor=false;
        if(cak) cakmaBalon(sira);
        if(isAcici && !cak) sundurmeKontrol(sira, kart);
        render();
        if(yerde.length===4){bekleniyor=true;render();setTimeout(elBitti,900);}
        else{
            sira=OY[(OY.indexOf(sira)+1)%4]; render();
            if(sira!==BENIM_ADIM&&oyunAktif&&!turBitti) setTimeout(dongu,350);
        }
    },650);
}

function elBitti(){
    var kaz=elKazanan();
    alinan[kaz]=(alinan[kaz]||0)+1;
    log('── El '+elNo+' kazananı: '+kaz+' (toplam: '+alinan[kaz]+') ──');
    // 2+ çakma varsa kazanan "Elini ayağını çek!" der
    var cakSayisi=yerde.filter(function(i){return i[2];}).length;
    if(cakSayisi>=2){ chatEkle(kaz,'Elini ayağını çek! ✋'); }
    // Kazanan ve kazanan kartın rengini kaydet (sündürme için)
    var kazKart=yerde.filter(function(i){return i[0]===kaz;})[0];
    oncekiElKazanan=kaz;
    oncekiElKazanRenk=kazKart?kazKart[1][0]:null;
    // Oynanan kartları ve renksizlikleri kaydet
    var elRenk=bSeri;
    yerde.forEach(function(item){
        var oyuncu=item[0], kart=item[1];
        oynananKartlar.push(kart);
        if(elRenk) trackRenksiz(oyuncu, elRenk, kart);
    });
    /* "Kazandı" banner felt üzerinde */
    var felt=document.getElementById('felt-el');
    if(felt){
        var ban=document.createElement('div'); ban.className='winban'; ban.textContent='🏆 '+kaz;
        felt.style.position='relative'; felt.appendChild(ban);
        setTimeout(function(){if(ban.parentNode)ban.parentNode.removeChild(ban);},850);
    }
    elNo++; sira=kaz; yerde=[]; bSeri=null; bekleniyor=false;


    if(elNo>13){turBitir();return;}
    setTimeout(function(){ render(); if(sira!==BENIM_ADIM&&oyunAktif&&!turBitti) setTimeout(dongu,350); },300);
}

function touchCard(e){e.preventDefault();cardClick(e);}

function cardClick(e){
    if(bekleniyor||donguCalisiyor){hataMesaji='Lütfen bekleyin...';render();return;}
    var cd=e.currentTarget;
    var kart=[cd.dataset.suit,cd.dataset.rank];
    var el=eller[BENIM_ADIM];
    if(!gecerli(kart,el,bSeri,kozlar[BENIM_ADIM],yerde)){hataMesaji=acikla(el,bSeri,kozlar[BENIM_ADIM],yerde);render();return;}
    var ri=el.findIndex(function(k){return k[0]===kart[0]&&k[1]===kart[1];});
    if(ri!==-1) eller[BENIM_ADIM].splice(ri,1);
    var isAcici = !bSeri; // kart oynamadan önce kontrol et
    if(!bSeri){bSeri=kart[0];log('── EL '+elNo+' BAŞLADI ── Açan: '+BENIM_ADIM+' | '+kart[0]+' '+kart[1]);}
    var cak=(kart[0]===kozlar[BENIM_ADIM]&&bSeri!==kozlar[BENIM_ADIM]);
    yerde.push([BENIM_ADIM,kart,cak]);
    hataMesaji=''; logBenOyna(kart,yerde.slice(0,-1),bSeri,kozlar[BENIM_ADIM]);
    if(cak) cakmaBalon(BENIM_ADIM);
    if(isAcici && !cak) sundurmeKontrol(BENIM_ADIM, kart);
    render();
    if(yerde.length===4){bekleniyor=true;render();setTimeout(elBitti,900);}
    else{
        sira=OY[(OY.indexOf(BENIM_ADIM)+1)%4]; render();
        if(sira!==BENIM_ADIM&&oyunAktif&&!turBitti) setTimeout(dongu,350);
    }
}

function turBitir(){
    var cik=OY.filter(function(o){return alinan[o]===ihale[o];});
    var bat=OY.filter(function(o){return alinan[o]!==ihale[o];});
    log('━━━━━ TUR '+buyukTur+' SKOR HESABI ━━━━━');
    OY.forEach(function(o){
        var s=ihale[o]||0,a=alinan[o]||0,fark=Math.abs(s-a),p=0,detay=[];
        if(cik.indexOf(o)>-1){
            var base=(s===0?5:s); p=base;
            if(o===OY[ebeIdx]){p+=10;detay.push('+10ebe');}
            if(bat.length===3){p+=10;detay.push('+10tekcikan');}
            if(herro[o]){p*=2;detay.push('x2herro');}
            log('[CIKTI] '+o+': '+s+'/'+a+' | '+detay.join(',')+'=+'+p+' Toplam:'+(skorlar[o]+p));
        } else {
            var base=(s===0?5:s); p=-(base+(fark*fark));
            if(bat.length===1){p-=10;detay.push('-10tekbatan');}
            if(herro[o]){p*=2;detay.push('x2herro');}
            log('[BATTI] '+o+': '+s+'/'+a+' fark='+fark+' | '+detay.join(',')+'='+p+' Toplam:'+(skorlar[o]+p));
        }
        skorlar[o]+=p;
    });
    log('━━━ '+OY.map(function(o){return o+'='+skorlar[o];}).join(' | ')+' ━━━');
    // Tur sonu batma lafları — her aşırı batan için ayrı mesaj
    setTimeout(function(){
        OY.forEach(function(o){
            var hd=ihale[o]||0, al=alinan[o]||0;
            var fark=al-hd; // fazla aldı
            if(fark>=3){
                // Batan kişi dışında rastgele biri söylesin
                var digerleri=OY.filter(function(x){return x!==o && alinan[x]===(ihale[x]||0);});
                if(!digerleri.length) return;
                var soyleyen=digerleri[Math.floor(Math.random()*digerleri.length)];
                if(fark===3){
                    chatEkle(soyleyen,'3 kere 3 9... '+o+' size geldik yoktunuz! 😄');
                } else if(fark===4){
                    chatEkle(soyleyen,'4 kere 4 16... hakem '+o+"'a dedi penaltı! 😄");
                } else {
                    chatEkle(soyleyen,'5 kere 5 25... '+o+'! Sen biraz diplere yerleş! 😄');
                }
            }
        });
    }, 400);
    // Tur sonu: en yüksek skora sahip kişi "Recep abi çay gönder" der
    var turMax=OY.reduce(function(a,b){return (skorlar[a]||0)>(skorlar[b]||0)?a:b;});
    setTimeout(function(){ chatEkle(turMax,'Recep abi çay gönder! ☕'); }, 600);
    ebeIdx=(ebeIdx+1)%4; buyukTur++;
    if(buyukTur>12){
        var ent=Object.keys(skorlar).map(function(k){return[k,skorlar[k]];});
        ent.sort(function(a,b){return b[1]-a[1];});
        var kazanan=ent[0][0];
        var kaybedenEn=ent[ent.length-1][0];
        chatEkle(kazanan,'Recep abi hesabı '+kaybedenEn+"'den al! 💸");
        setTimeout(function(){alert('OYUN BİTTİ!\nKAZANAN: '+ent[0][0]+' ('+ent[0][1]+' puan)');},800);
        setTimeout(function(){location.reload();},2200); return;
    }
    turBitti=true; oyunAktif=false; render();
}

function nextTur(){turBitti=false;oyunAktif=true;yeniTur();}

function yeniTur(){
    for(var i=0;i<OY.length;i++) kozlar[OY[i]]=SUITS[i%4];
    var deste=[];
    SUITS.forEach(function(s){Object.keys(DS).forEach(function(r){deste.push([s,r]);});});
    for(var i=deste.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=deste[i];deste[i]=deste[j];deste[j]=t;}
    for(var i=0;i<OY.length;i++){
        var sl=deste.slice(i*13,i*13+13);
        eller[OY[i]]=sirala(sl,kozlar[OY[i]]);
        if(OY[i]===BENIM_ADIM) logHand(OY[i],eller[OY[i]],kozlar[OY[i]]);
        else log(OY[i]+' → '+eller[OY[i]].length+' kart');
    }
    ihale={}; herro={};
    alinan={}; OY.forEach(function(o){alinan[o]=0;});
    oynananKartlar=[]; renksizler={};
    oncekiElKazanan=null; oncekiElKazanRenk=null; ayniRenkSeri=0;
    ihaleToplam=0; ihaleAS=true; oyunAktif=true; turBitti=false;
    sira=OY[(ebeIdx+1)%4]; elNo=0; yerde=[]; bSeri=null; hataMesaji='';
    donguCalisiyor=false; bekleniyor=false;
    log('══ TUR '+buyukTur+'/12 BAŞLADI ═══ Ebe:'+OY[ebeIdx]+' | İlk:'+sira+' ══');
    render();
    if(sira!==BENIM_ADIM) setTimeout(botIhaleAdim,500);
}
